type: dnf
remove:
  packages:
    # Has a bug where files are not opened in tabs
    # and one editor is enough
    - kwrite
repos:
  cleanup: true
  copr:
    - birkch/Koi
    - scujas/plasma-applet-appgrid
    - deltacopy/plasma6-applets-kara
    - matinlotfali/KDE-Rounded-Corners
    - infinality/kwin-effects-better-blur-dx
install:
  packages:
    - Koi # Automatic theme switcher
    - plasma-applet-appgrid
    - plasma6-applets-kara
    - kwin-effect-roundcorners
    - kwin-effects-better-blur-dx

    # KDE Calendar
    - merkuro
    - kdepim-addons   # System integration
    - kdepim-runtime  # Accounts support
